# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "TagStudio"

[setup]
script = '''
if [ ! -f ./.venv/bin/activate ]; then
  python3.12 -m venv .venv
fi

source ./.venv/bin/activate

# Reinstall deps only when pyproject changes
if [ ! -f ./.venv/pyproject.toml ] || ! cmp -s pyproject.toml ./.venv/pyproject.toml; then
  python -m pip install -e ".[dev]"
  cp pyproject.toml ./.venv/pyproject.toml
fi
'''

[[actions]]
name = "Run web server"
icon = "tool"
command = '''
bun install
bun run dev:web
'''
